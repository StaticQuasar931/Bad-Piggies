<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="theme-color" content="#000000">
  <title>Unity WebGL Player | Bad Piggies</title>

  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/StaticQuasar931/Images@main/icon.png">

  <style>
    :root{
      --brand:#5ee1ff;
      --glow:0 0 12px rgba(94,225,255,.65), 0 0 32px rgba(155,255,183,.35);
      --shadow:0 10px 30px rgba(0,0,0,.4);
      --footer-h:52px;
    }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#eaf4ff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      overflow:hidden;
    }

    body{
      position:relative;
    }

    .webgl-content{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
    }

    #gameContainer{
      position:absolute;
      inset:0;
      width:100vw !important;
      height:100vh !important;
      background:#000 center center / cover no-repeat;
    }

    .footer{
      position:fixed;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      z-index:30;
      display:flex;
      align-items:center;
      gap:12px;
      min-height:var(--footer-h);
      padding:8px 14px;
      border-radius:14px;
      background:rgba(0,0,0,.62);
      backdrop-filter:blur(8px);
      box-shadow:0 10px 30px rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.12);
    }

    .webgl-logo{
      width:48px;
      height:18px;
      background:url("TemplateData/webgl-logo.png") center center / contain no-repeat;
      flex:0 0 auto;
    }

    .fullscreen{
      width:38px;
      height:38px;
      border-radius:10px;
      cursor:pointer;
      flex:0 0 auto;
      background:
        rgba(255,255,255,.08)
        url("TemplateData/fullscreen.png") center center / 20px 20px no-repeat;
      border:1px solid rgba(255,255,255,.14);
      transition:transform .18s ease, background-color .18s ease, box-shadow .18s ease;
    }

    .fullscreen:hover{
      transform:scale(1.06);
      background-color:rgba(255,255,255,.14);
      box-shadow:0 0 16px rgba(94,225,255,.22);
    }

    .title{
      font-size:14px;
      font-weight:700;
      color:#fff;
      white-space:nowrap;
    }

    /* Static Menu */
    #staticMenu{
      position:fixed;
      left:12px;
      top:12px;
      z-index:9999;
      display:flex;
      gap:10px;
      align-items:center;
      user-select:none;
      padding:10px 14px;
      border-radius:12px;
      background:linear-gradient(135deg, rgba(20,20,28,.9), rgba(20,20,28,.6));
      border:1px solid rgba(94,225,255,.35);
      color:#e8f3ff;
      box-shadow:var(--glow), var(--shadow);
      font-size:14px;
      animation:menuEnter .6s ease .15s both;
    }

    #staticMenu a{
      color:#5ee1ff;
      font-weight:800;
      text-decoration:none;
    }

    #closeStaticMenu{
      color:#f55;
      cursor:pointer;
      padding:2px 6px;
      border-radius:6px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.06);
    }

    @keyframes menuEnter{
      from{opacity:0; transform:translateY(-8px)}
      to{opacity:1; transform:translateY(0)}
    }

    /* Rotating slide-in widget */
    #staticSlideMenu{
      position:fixed;
      bottom:24px;
      right:24px;
      z-index:9999;
      width:100px;
      height:100px;
      pointer-events:none;
      opacity:0;
      transform:translateX(140px) scale(.96);
    }

    #staticSlideMenu a{
      display:block;
      width:100%;
      height:100%;
    }

    #staticSlideMenu img{
      width:100%;
      height:100%;
      object-fit:contain;
      border:0;
      border-radius:0;
      background:transparent;
      box-shadow:none;
      transition:opacity .25s ease;
    }

    .slide-in{ animation:slideIn 2s ease forwards; }
    .slide-out{ animation:slideOut 2s ease forwards; }

    @keyframes slideIn{
      from{opacity:0; transform:translateX(140px) scale(.96)}
      to{opacity:1; transform:translateX(0) scale(1)}
    }

    @keyframes slideOut{
      from{opacity:1; transform:translateX(0) scale(1)}
      to{opacity:0; transform:translateX(140px) scale(.96)}
    }

    .seo-hidden{
      position:absolute;
      width:1px;
      height:1px;
      overflow:hidden;
      clip:rect(1px,1px,1px,1px);
      white-space:nowrap;
    }

    @media (max-width:900px){
      .footer{
        bottom:8px;
        gap:10px;
        padding:8px 12px;
        max-width:calc(100vw - 24px);
      }

      .title{
        font-size:13px;
        white-space:normal;
        line-height:1.2;
      }
    }

    @media (max-width:600px){
      #staticMenu{
        font-size:13px;
        padding:8px 12px;
        max-width:calc(100vw - 24px);
      }

      #staticSlideMenu{
        width:88px;
        height:88px;
      }

      .footer{
        width:auto;
        max-width:calc(100vw - 20px);
      }

      .webgl-logo{
        width:40px;
      }

      .fullscreen{
        width:34px;
        height:34px;
        background-size:18px 18px;
      }
    }
  </style>

  <script src="TemplateData/UnityProgress.js"></script>
  <script src="Build/UnityLoader.js"></script>
</head>
<body style="background-color:black;">

  <div class="webgl-content">
    <div id="gameContainer"></div>

    <div class="footer">

      <div class="fullscreen" onclick="if(window.gameInstance){gameInstance.SetFullscreen(1);}" title="Fullscreen" aria-label="Fullscreen button"></div>

  <div id="staticMenu" role="region" aria-label="StaticQuasar931 menu">

  <div class="seo-hidden" aria-hidden="true">

  </div>

  <script>

    **(function () {
      var menu = document.getElementById("staticMenu");
      var btn = document.getElementById("closeStaticMenu");
      var KEY = "sq931_staticMenu_hidden_until";

      function showMenu() {
        if (menu) menu.style.display = "flex";
      }

      function hideFor3Minutes() {
        if (!menu) return;
        menu.style.display = "none";
        var until = Date.now() + 180000;
        localStorage.setItem(KEY, String(until));
        setTimeout(showMenu, 180000);
      }

      var until = parseInt(localStorage.getItem(KEY) || "0", 10);
      if (until && Date.now() < until) {

        setTimeout(showMenu, until - Date.now());
      } else {
        showMenu();
      }

      if (btn) btn.onclick = hideFor3Minutes;
    })();**

    **(function () {
      var wrap = document.getElementById("staticSlideMenu");
      var link = document.getElementById("staticSlideLink");
      var img = document.getElementById("staticSlideImg");

      var FORM = {
        src: "https://cdn.jsdelivr.net/gh/StaticQuasar931/Images@main/GoogleForm.png",
        alt: "StaticQuasar931 Google Form for feedback and requests",
        link: "https://sites.google.com/view/staticquasar931/google-form"
      };

      var DISCORD = {
        src: "https://cdn.jsdelivr.net/gh/StaticQuasar931/Images@main/Join_Our_DC_StaticQuassar931_lcplrf.png",
        alt: "Join the StaticQuasar931 Discord",
        link: "https://discord.gg/DP2hM7RRhR"
      };

      var INSTA = {
        src: "https://cdn.jsdelivr.net/gh/StaticQuasar931/Images@main/Follow-us--IG",
        alt: "StaticQuasar931 Instagram",
        link: "https://www.instagram.com/freeschoolgamepage/"
      };

      var ROTATION = [FORM, DISCORD, INSTA];
      for (var i = 0; i < ROTATION.length; i++) {
        var preload = new Image();
        preload.src = ROTATION[i].src;
      }

      var T_IN = 2000;
      var T_SHOW = 5000;
      var T_OUT = 2000;
      var T_HIDDEN = 20000;
      var idx = 0;

      function applyState(state) {
        link.href = state.link;
        img.alt = state.alt;
        img.style.opacity = "0";
        setTimeout(function () {
          img.src = state.src;
        }, 80);
        img.onload = function () {
          img.style.opacity = "1";
        };
      }

      function delay(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, ms);
        });
      }

      (async function cycle() {
        while (true) {
          applyState(ROTATION[idx]);
          wrap.style.pointerEvents = "auto";
          wrap.classList.remove("slide-out");
          wrap.classList.add("slide-in");
          await delay(T_IN + T_SHOW);
          wrap.classList.remove("slide-in");
          wrap.classList.add("slide-out");
          await delay(T_OUT);
          wrap.style.pointerEvents = "none";
          await delay(T_HIDDEN);
          idx = (idx + 1) % ROTATION.length;
        }
      })();
    })();**

    **(function () {
      var idsToToggle = ["staticMenu", "staticSlideMenu"];
      var seq = [];
      var target = ["y", "u", "i"];

      function toggleAllVisualSeo() {
        for (var i = 0; i < idsToToggle.length; i++) {
          var el = document.getElementById(idsToToggle[i]);
          if (!el) continue;

          var hidden = (el.style.display === "none" || getComputedStyle(el).display === "none");
          if (hidden) {
            el.style.display = idsToToggle[i] === "staticMenu" ? "flex" : "block";
          } else {
            el.style.display = "none";
          }
        }
      }

      window.addEventListener("keydown", function (e) {
        seq.push(String(e.key || "").toLowerCase());
        if (seq.length > 3) seq.shift();
        if (seq.join("") === target.join("")) {
          toggleAllVisualSeo();
        }
      });
    })();**

      }
    });**
  </script>
</body>
</html>
